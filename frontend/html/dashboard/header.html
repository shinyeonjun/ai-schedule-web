<!-- 메인 헤더 -->
<header class="main-header">
    <div class="header-left">
    </div>
    
    <div class="header-right">
        <!-- 알림 시스템 -->
        <div class="notification-container">
            <button class="btn-icon notification-btn" id="notificationBtn" title="메시지">
                <i class="fas fa-bell"></i>
                <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
            </button>
            
            <!-- 알림 드롭다운 -->
            <div class="notification-dropdown" id="notificationDropdown">
                <div class="notification-header">
                    <h3>메시지</h3>
                    <button class="btn-text" id="markAllReadBtn">모두 읽음</button>
                </div>
                
                <div class="notification-list" id="notificationList">
                    <!-- Notification items will be dynamically added here -->
                </div>
                
                <div class="notification-footer">
                    <button class="btn-text" id="viewAllNotificationsBtn">모든 메시지 보기</button>
                </div>
            </div>
        </div>
        
        <!-- 사용자 프로필 -->
        <div class="user-profile" id="userProfile">
            <div class="user-avatar">
                <img id="userAvatar" src="" alt="사용자 프로필" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="avatar-placeholder" style="display: none;">
                    <span id="userInitials"></span>
                </div>
            </div>
            <div class="user-info">
                <div class="user-name" id="userName">로딩 중...</div>
                <div class="user-email" id="userEmail">로딩 중...</div>
            </div>
            <div class="user-actions">
                <button class="btn-icon" onclick="dashboard.handleLogout()" title="로그아웃">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</header>
