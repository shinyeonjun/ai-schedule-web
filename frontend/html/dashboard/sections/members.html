<!-- 인원 관리 섹션 -->
<section id="members-section" class="content-section">
    <div class="section-header">
        <h1 class="section-title">인원 관리</h1>
        <p class="section-description">SULLIVAN에 등록된 사용자들을 확인할 수 있습니다.</p>
    </div>

    <!-- 탭 메뉴 -->
    <div class="members-tabs">
        <button class="tab-button active" data-tab="mufi-users">
            <i class="fas fa-users"></i> SULLIVAN 사용자
        </button>
        <button class="tab-button" data-tab="external-contacts">
            <i class="fas fa-address-book"></i> 외부 인원
        </button>
    </div>

    <!-- MUFI 사용자 탭 -->
    <div class="tab-content active" id="mufi-users-tab">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">SULLIVAN 등록 사용자</h2>
            </div>
            
            <div class="members-container" id="membersContainer">
                <div class="loading-placeholder" id="membersLoading">
                    <div class="loading-spinner"></div>
                    <p>사용자 목록을 불러오는 중...</p>
                </div>
                
                <div class="users-grid" id="usersGrid" style="display: none;">
                    <!-- 사용자 카드들이 여기에 동적으로 추가됩니다 -->
                </div>
                
                <div class="placeholder-content" id="emptyPlaceholder" style="display: none;">
                    <div class="placeholder-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <h3>등록된 사용자가 없습니다</h3>
                    <p>첫 번째 사용자가 되어보세요!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 외부 인원 탭 -->
    <div class="tab-content" id="external-contacts-tab">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">외부 인원 관리</h2>
                <button class="btn btn-primary" id="addContactBtn">
                    <i class="fas fa-plus"></i> 외부 인원 추가
                </button>
            </div>
            
            <div class="contacts-container" id="contactsContainer">
                <div class="loading-placeholder" id="contactsLoading" style="display: none;">
                    <div class="loading-spinner"></div>
                    <p>외부 인원 목록을 불러오는 중...</p>
                </div>
                
                <div class="contacts-grid" id="contactsGrid" style="display: none;">
                    <!-- 외부 인원 카드들이 여기에 동적으로 추가됩니다 -->
                </div>
                
                <div class="placeholder-content" id="contactsEmptyPlaceholder">
                    <div class="placeholder-icon">
                        <i class="fas fa-address-book"></i>
                    </div>
                    <h3>등록된 외부 인원이 없습니다</h3>
                    <p>새로운 외부 인원을 추가해보세요.</p>
                </div>
            </div>
        </div>
    </div>
</section>
