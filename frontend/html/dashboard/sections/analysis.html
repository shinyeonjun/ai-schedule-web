<!-- 통화 분석 섹션 -->
<section id="analysis-section" class="content-section active">
    <div class="section-header">
        <h1 class="section-title">통화 분석</h1>
        <p class="section-description">통화 내용을 업로드하거나 직접 입력하면 AI가 자동으로 분석하여 일정을 추출합니다.</p>
    </div>

    <div class="card">
        <!-- 탭 네비게이션 -->
        <div class="analysis-tabs">
            <button class="tab-button active" data-tab="file-upload">
                <i class="fas fa-file-upload"></i> 파일 업로드
            </button>
            <button class="tab-button" data-tab="text-input">
                <i class="fas fa-keyboard"></i> 직접 입력
            </button>
        </div>

        <!-- 파일 업로드 탭 -->
        <div id="file-upload" class="tab-content active">
            <div class="upload-area" id="uploadArea">
                <p class="upload-text">통화 내용 파일을 여기에 드래그하거나 클릭하여 선택하세요</p>
                <p class="upload-subtext">지원 형식: .txt 파일 (최대 10MB)</p>

                <input type="file" id="fileInput" accept=".txt" style="display: none;">
            </div>

            <div class="upload-actions">
                <button type="button" class="btn btn-primary" id="uploadBtn" disabled>
                    <i class="fas fa-search"></i> 분석 시작
                </button>
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-details">
                    <i class="fas fa-file-text file-icon"></i>
                    <div class="file-content">
                        <div class="file-name" id="fileName">test.txt</div>
                        <div class="file-size" id="fileSize">4.22 KB</div>
                    </div>
                    <button type="button" class="remove-file" id="removeFileBtn" title="파일 제거">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 직접 입력 탭 -->
        <div id="text-input" class="tab-content">
            <div class="form-group">
                <label for="textContent" class="form-label">통화 내용</label>
                <textarea id="textContent" class="form-control" placeholder="통화 내용을 여기에 입력하세요...

예시:
- 내일 오후 2시에 마케팅 회의
- 김대리와 프로젝트 진행 상황 논의
- 다음 주 화요일 고객 미팅 일정 확정

더 자세한 내용을 입력할수록 정확한 일정 분석이 가능합니다." rows="8"></textarea>

                <div class="text-controls">
                    <button type="button" class="btn btn-primary" id="analyzeTextBtn" disabled>
                        <i class="fas fa-search"></i> 분석 시작
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 분석 결과 -->
    <div class="results-section">
        <div id="analysisResults" class="analysis-results">
            <div id="analysisContent"></div>
        </div>
    </div>
</section>
