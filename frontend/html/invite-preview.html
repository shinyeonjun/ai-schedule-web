<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그룹 초대 - SULLIVAN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .invite-container {
            background: #ffffff;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .invite-icon {
            width: 80px;
            height: 80px;
            background: #ffffff;
            border: 1px solid #1e293b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2rem;
            color: #1e293b;
        }

        .invite-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .invite-subtitle {
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 2rem;
        }

        .group-info {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .group-info-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .group-info-item:last-child {
            border-bottom: none;
        }

        .group-info-item i {
            color: #1e293b;
            width: 20px;
            text-align: center;
        }

        .group-info-label {
            font-size: 0.9rem;
            color: #64748b;
            min-width: 80px;
        }

        .group-info-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1e293b;
            flex: 1;
        }

        .invite-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 0.875rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid #1e293b;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #1e293b;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.3);
        }

        .btn-secondary {
            background: #ffffff;
            color: #1e293b;
        }

        .btn-secondary:hover {
            background: #f8fafc;
        }

        .invite-message {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #475569;
            font-style: italic;
        }

        .error-container {
            text-align: center;
        }

        .error-icon {
            font-size: 3rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .error-message {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 2rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #1e293b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .expire-info {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .expire-info i {
            color: #1e293b;
        }

        @media (max-width: 640px) {
            .invite-container {
                padding: 2rem;
            }

            .invite-title {
                font-size: 1.5rem;
            }

            .invite-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="invite-container" id="inviteContainer">
        <!-- 로딩 중 -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>초대 정보를 불러오는 중...</p>
        </div>

        <!-- 초대 정보 (JavaScript로 동적 생성) -->
        <div id="inviteContent" style="display: none;"></div>

        <!-- 에러 메시지 (JavaScript로 동적 생성) -->
        <div id="errorContent" style="display: none;"></div>
    </div>

    <script>
        // URL에서 토큰 추출
        const pathParts = window.location.pathname.split('/');
        const token = pathParts[pathParts.length - 1];

        console.log('🔗 초대 토큰:', token);

        // 초대 정보 로드
        async function loadInviteInfo() {
            try {
                const response = await fetch(`/api/groups/invite/${token}/preview`);
                const data = await response.json();

                if (response.ok && data.success) {
                    showInviteContent(data.data);
                } else {
                    const errorMessage = data.detail || '이 초대 링크를 찾을 수 없거나 이미 사용되었습니다.';
                    if (response.status === 410) {
                        showError('만료된 초대입니다', errorMessage);
                    } else {
                        showError('유효하지 않은 초대입니다', errorMessage);
                    }
                }

            } catch (error) {
                console.error('❌ 초대 정보 로드 실패:', error);
                showError('오류가 발생했습니다', '초대 정보를 불러오는데 실패했습니다. 잠시 후 다시 시도해주세요.');
            }
        }

        // 초대 정보 표시
        function showInviteContent(data) {
            const group = data.group;
            const members = data.members || [];
            const invite = data.invite;
            
            const expiredDate = invite.expired_at ? new Date(invite.expired_at).toLocaleDateString('ko-KR') : null;
            const daysLeft = invite.expired_at ? Math.ceil((new Date(invite.expired_at) - new Date()) / (1000 * 60 * 60 * 24)) : null;

            // 멤버 목록 HTML 생성
            let membersHtml = '';
            if (members.length > 0) {
                membersHtml = `
                    <div class="group-info-item" style="flex-direction: column; align-items: flex-start; gap: 0.5rem;">
                        <div style="display: flex; align-items: center; gap: 0.75rem; width: 100%;">
                            <i class="fas fa-users"></i>
                            <span class="group-info-label">멤버</span>
                            <span class="group-info-value">${members.length}명</span>
                        </div>
                        <div style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; width: 100%;">
                            ${members.slice(0, 10).map(member => `
                                <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                                    ${member.picture ? `
                                        <img src="${member.picture}" alt="${member.name}" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                                    ` : `
                                        <div style="width: 32px; height: 32px; border-radius: 50%; background: #1e293b; color: white; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600;">
                                            ${member.name ? member.name.charAt(0) : '?'}
                                        </div>
                                    `}
                                    <span style="font-size: 0.85rem; color: #1e293b; font-weight: 500;">${member.name || member.email}</span>
                                </div>
                            `).join('')}
                            ${members.length > 10 ? `<div style="padding: 0.5rem; color: #64748b; font-size: 0.85rem;">외 ${members.length - 10}명</div>` : ''}
                        </div>
                    </div>
                `;
            }

            const content = `
                <div class="invite-icon">
                    <i class="fas fa-users"></i>
                </div>

                <h1 class="invite-title">${group.group_name}</h1>
                <p class="invite-subtitle">${group.admin ? group.admin.name + '님이 초대했습니다' : '그룹에 초대되었습니다'}</p>

                <div class="group-info">
                    ${group.description ? `
                        <div class="group-info-item">
                            <i class="fas fa-info-circle"></i>
                            <span class="group-info-label">설명</span>
                            <span class="group-info-value">${group.description}</span>
                        </div>
                    ` : ''}
                    ${group.admin ? `
                        <div class="group-info-item">
                            <i class="fas fa-user"></i>
                            <span class="group-info-label">그룹 소유자</span>
                            <span class="group-info-value">${group.admin.name || group.admin.email}</span>
                        </div>
                    ` : ''}
                    ${membersHtml}
                </div>

                <div class="invite-actions">
                    <button class="btn btn-secondary" onclick="handleCancel()">
                        <i class="fas fa-times"></i> 취소
                    </button>
                    <button class="btn btn-primary" id="acceptBtn" onclick="handleAccept()">
                        <i class="fas fa-check"></i> 참가하기
                    </button>
                </div>

                ${expiredDate ? `
                    <div class="expire-info">
                        <i class="fas fa-clock"></i>
                        <span>${expiredDate}까지 유효${daysLeft ? ` (${daysLeft}일 남음)` : ''}</span>
                    </div>
                ` : ''}
            `;

            document.getElementById('loading').style.display = 'none';
            document.getElementById('inviteContent').innerHTML = content;
            document.getElementById('inviteContent').style.display = 'block';
            
            // 로그인 상태 확인 및 버튼 텍스트 변경
            const authToken = localStorage.getItem('mufi_token');
            const acceptBtn = document.getElementById('acceptBtn');
            if (!authToken && acceptBtn) {
                acceptBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 로그인 후 참가하기';
            }
        }

        // 에러 표시
        function showError(title, message) {
            const content = `
                <div class="error-container">
                    <div class="error-icon">
                        <i class="fas fa-exclamation-circle"></i>
                    </div>
                    <h2 class="error-title">${title}</h2>
                    <p class="error-message">${message}</p>
                    <button class="btn btn-primary" onclick="window.location.href='/login'">
                        <i class="fas fa-home"></i> 메인으로 이동
                    </button>
                </div>
            `;

            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorContent').innerHTML = content;
            document.getElementById('errorContent').style.display = 'block';
        }

        // 가입 처리
        async function handleAccept() {
            try {
                const authToken = localStorage.getItem('mufi_token');

                // 로그인 확인
                if (!authToken) {
                    // 로그인 페이지로 리다이렉트 (초대 토큰 포함)
                    const inviteToken = pathParts[pathParts.length - 1];
                    localStorage.setItem('pending_invite_token', inviteToken);
                    window.location.href = `/login`;
                    return;
                }

                console.log('✅ 그룹 참가 처리 중...');

                const inviteToken = pathParts[pathParts.length - 1];
                
                // 로딩 표시
                const acceptBtn = event.target.closest('.btn-primary');
                const originalText = acceptBtn.innerHTML;
                acceptBtn.disabled = true;
                acceptBtn.innerHTML = '<div class="loading-spinner" style="width: 16px; height: 16px; border: 2px solid #ffffff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;"></div>';
                
                const response = await fetch(`/api/groups/invite/${inviteToken}/join`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert('그룹에 성공적으로 참가했습니다!');
                    window.location.href = '/dashboard#group';
                } else {
                    acceptBtn.disabled = false;
                    acceptBtn.innerHTML = originalText;
                    alert(data.detail || '그룹 참가에 실패했습니다. 다시 시도해주세요.');
                }

            } catch (error) {
                console.error('❌ 참가 처리 실패:', error);
                const acceptBtn = event.target.closest('.btn-primary');
                if (acceptBtn) {
                    acceptBtn.disabled = false;
                    acceptBtn.innerHTML = '<i class="fas fa-check"></i> 참가하기';
                }
                alert('참가 처리 중 오류가 발생했습니다. 다시 시도해주세요.');
            }
        }

        // 취소 처리
        function handleCancel() {
            if (confirm('초대를 거절하시겠습니까?')) {
                window.location.href = '/login';
            }
        }

        // 로그인 상태 확인 및 버튼 표시
        function checkLoginStatus() {
            const authToken = localStorage.getItem('mufi_token');
            const acceptBtn = document.querySelector('.btn-primary');
            
            if (!authToken && acceptBtn) {
                // 로그인하지 않은 경우 버튼 텍스트 변경
                acceptBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 로그인 후 참가하기';
            }
        }

        // 페이지 로드 시 초대 정보 로드
        loadInviteInfo();
        
        // 로그인 상태 확인
        setTimeout(checkLoginStatus, 100);
    </script>
</body>
</html>
