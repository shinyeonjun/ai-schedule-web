<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUFI - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <!-- 왼쪽 브랜딩 섹션 -->
        <div class="login-brand">
            <div class="brand-content">
                <!-- 로고 -->
                <div class="brand-logo">
                    <h1>MUFI</h1>
                    <div class="logo-subtitle">AI 통화 분석 & 일정 관리</div>
                </div>
                
                <!-- 기능 소개 -->
                <div class="feature-showcase">
                    <div class="feature-item">
                        <div class="feature-icon">📞</div>
                        <div class="feature-text">
                            <h3>통화 분석</h3>
                            <p>AI가 통화 내용을 자동으로 분석하여 핵심 정보를 추출합니다</p>
                        </div>
                    </div>
                    
                    <div class="feature-item">
                        <div class="feature-icon">📅</div>
                        <div class="feature-text">
                            <h3>일정 관리</h3>
                            <p>추출된 일정을 캘린더에 자동으로 등록하고 관리합니다</p>
                        </div>
                    </div>
                    
                    <div class="feature-item">
                        <div class="feature-icon">📧</div>
                        <div class="feature-text">
                            <h3>팀 공유</h3>
                            <p>분석된 내용을 팀원들과 이메일로 간편하게 공유합니다</p>
                        </div>
                    </div>
                </div>
                
                <!-- 통계 -->
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number">90%</div>
                        <div class="stat-label">시간 절약</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">100+</div>
                        <div class="stat-label">활성 사용자</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">99%</div>
                        <div class="stat-label">분석 정확도</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 오른쪽 로그인 폼 -->
        <div class="login-form-container">
            <div class="login-card">
                <!-- 헤더 -->
                <div class="login-header">
                    <h2>작업데스크 로그인</h2>
                    <p>개인 작업공간에 접속하여 통화 분석을 시작하세요</p>
                </div>
                
                <!-- Google 로그인 -->
                <div class="google-login-section">
                    <button type="button" class="btn btn-primary google-login-btn" id="google-login-btn">
                        <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google로 로그인
                    </button>
                    
                    <p class="login-description">
                        Google 계정으로 간편하게 로그인하여<br>
                        MUFI의 모든 기능을 이용하세요
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 알림 컨테이너 -->
    <div id="notification-container" class="notification-container"></div>
    
    <!-- Auth Manager 로드 -->
    <script type="module" src="js/modules/auth.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
